[project]
name = "agent-contracts"
version = "0.1.0"
description = "Shared Pydantic models for Agent Platform cross-service contracts"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.6",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["agent_contracts"]
