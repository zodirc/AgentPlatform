# Proof gate (docs/28 PX0 · docs/11 §4 · docs/29 suite=ci)
# Blocks merge on full CI proof: unit + smoke + eval-all + runtime-test.
# Same script as Ops Eval Console「完整证明」: scripts/ci_proof.sh
# Does NOT run inside user Turns; zero impact on agent rate/logic.
#
# Flow (must stay aligned with scripts/ci_proof.sh + scripts/gate.sh):
#   1. Bootstrap .env (stub + hash + Basic auth / ADMIN_SESSION_BYPASS)
#   2. unit.* (no Docker)
#   3. make gate → smoke (--build, runtime-lite) → eval-all
#      remounts WORKSPACE_HOST_PATH=.eval-workspace on runtime+api,
#      chmod world-writable bind mount (no chown — runtime uid 1000 must write),
#      pins system Work root to /workspace
# Path hint (PX0d): if you change retrieval/queue code or compose overlays,
# also run locally: make eval-retrieval / make eval-queue before merge.
# Prompt/tool sensitive paths (run make gate / Ops suite=ci):
#   services/runtime/app/scenarios/**/system.md
#   services/runtime/app/tools/bootstrap.py
#   services/runtime/app/controller/**
#   packages/contracts/**

name: ci

on:
  pull_request:
  push:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  proof:
    name: CI proof (unit + gate)
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Bootstrap .env
        run: |
          if [[ ! -f .env ]]; then cp .env.example .env; fi
          # Normalize line endings; rewrite auth/smoke knobs without inline comments.
          sed -i 's/\r$//' .env || true
          sed -i 's/^MODEL_MODE=.*/MODEL_MODE=stub/' .env || true
          grep -q '^MODEL_MODE=' .env || echo 'MODEL_MODE=stub' >> .env
          sed -i 's/^EMBEDDING_BACKEND=.*/EMBEDDING_BACKEND=hash/' .env || true
          grep -q '^EMBEDDING_BACKEND=' .env || echo 'EMBEDDING_BACKEND=hash' >> .env
          sed -i 's/^EMBEDDING_DIMENSIONS=.*/EMBEDDING_DIMENSIONS=256/' .env || true
          grep -q '^EMBEDDING_DIMENSIONS=' .env || echo 'EMBEDDING_DIMENSIONS=256' >> .env
          sed -i 's/^AUTH_ENABLED=.*/AUTH_ENABLED=true/' .env || true
          grep -q '^AUTH_ENABLED=' .env || echo 'AUTH_ENABLED=true' >> .env
          sed -i 's/^ADMIN_PASSWORD=.*/ADMIN_PASSWORD=admin/' .env || true
          grep -q '^ADMIN_PASSWORD=' .env || echo 'ADMIN_PASSWORD=admin' >> .env
          sed -i 's/^ADMIN_SESSION_BYPASS=.*/ADMIN_SESSION_BYPASS=true/' .env || true
          grep -q '^ADMIN_SESSION_BYPASS=' .env || echo 'ADMIN_SESSION_BYPASS=true' >> .env
          sed -i 's/^END_USER_AUTH_ENABLED=.*/END_USER_AUTH_ENABLED=true/' .env || true
          grep -q '^END_USER_AUTH_ENABLED=' .env || echo 'END_USER_AUTH_ENABLED=true' >> .env
          # Ensure no stale OPS secret disables unrelated mounts in CI images.
          sed -i 's/^OPS_TEST_SECRET=.*/OPS_TEST_SECRET=/' .env || true
      - name: Full CI proof
        run: |
          set -o pipefail
          CI=true GATE_SKIP_RESTORE=1 bash scripts/ci_proof.sh 2>&1 | tee ci-proof.log
      - name: Summarize eval failures
        if: failure()
        run: |
          {
            echo "## CI proof failures"
            echo ""
            echo "Runner uid=\`$(id -u)\` gid=\`$(id -g)\` (runtime image app=1000; eval uses chmod not chown)."
            echo ""
            if [[ -f reports/eval-last-failures.txt ]]; then
              echo "### eval-last-failures.txt"
              echo '```'
              cat reports/eval-last-failures.txt
              echo '```'
            fi
            echo "### FAIL / case lines (tail)"
            echo '```'
            grep -E 'FAIL:|^==> |case\(s\) failed|Error:|PermissionError|End-user' ci-proof.log | tail -80 || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload proof log
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: ci-proof-log
          path: |
            ci-proof.log
            reports/eval-last-failures.txt
          if-no-files-found: ignore
