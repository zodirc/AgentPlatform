# Optional queue profile: redis + async worker (ADR-010 Phase 2)
# Usage: docker compose -f deploy/docker-compose.yml -f deploy/compose/queue.yml --profile queue up -d
# With HA: add -f deploy/compose/ha.yml and set RUNTIME_URL=http://runtime-a:8001

services:
  api:
    profiles: [queue]
    environment:
      WORKER_MODE: outbox

  redis:
    image: redis:7-alpine
    container_name: agent-redis
    profiles: [queue]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  worker:
    build:
      context: ..
      dockerfile: services/api/Dockerfile
    container_name: agent-worker
    profiles: [queue]
    command: ["python", "-m", "app.worker.main"]
    environment:
      DATABASE_URL: ${DATABASE_URL}
      RUNTIME_URL: ${RUNTIME_URL:-http://runtime:8001}
      RUNTIME_URL_MAP: ${RUNTIME_URL_MAP:-}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN}
      APP_SECRET_KEY: ${APP_SECRET_KEY}
      APP_ENV: ${APP_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      runtime:
        condition: service_healthy
      redis:
        condition: service_healthy
