# Phase 0 — single compose entry (docs/03 §4.1)
services:
  postgres:
    # pgvector image is the default retrieval backend (RETRIEVAL_BACKEND=pgvector).
    # JSON file index remains a fallback when the extension/probe fails.
    image: pgvector/pgvector:pg16
    container_name: agent-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agent}
      POSTGRES_DB: ${POSTGRES_DB:-agent}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./init/pgvector.sql:/docker-entrypoint-initdb.d/01-pgvector.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agent} -d ${POSTGRES_DB:-agent}"]
      interval: 5s
      timeout: 5s
      retries: 10

  runtime:
    image: agent-platform-runtime:default
    build:
      context: ..
      # Default deploy image includes baked sentence-transformers (docs/03).
      # Lightweight hash-only image: services/runtime/Dockerfile (CI / make eval-*).
      dockerfile: services/runtime/Dockerfile.retrieval
      args:
        EMBEDDING_MODEL: ${EMBEDDING_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
    container_name: agent-runtime
    environment:
      DATABASE_URL: ${DATABASE_URL}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN}
      MODEL_PROVIDER: ${MODEL_PROVIDER:-anthropic}
      MODEL_MODE: ${MODEL_MODE:-live}
      MODEL_API_KEY: ${MODEL_API_KEY:-}
      MODEL_NAME: ${MODEL_NAME:-}
      APP_SECRET_KEY: ${APP_SECRET_KEY}
      CONFIG_ENCRYPTION_KEY: ${CONFIG_ENCRYPTION_KEY:-}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      DATA_DIR: /data
      WORKSPACE_ROOT: /workspace
      APP_ENV: ${APP_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      MODEL_TIMEOUT_SECONDS: ${MODEL_TIMEOUT_SECONDS:-120}
      RETRIEVAL_MODE: ${RETRIEVAL_MODE:-hybrid}
      RETRIEVAL_BACKEND: ${RETRIEVAL_BACKEND:-pgvector}
      INDEX_VIA_WORKER: ${INDEX_VIA_WORKER:-true}
      EMBEDDING_BACKEND: ${EMBEDDING_BACKEND:-sentence_transformers}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
      EMBEDDING_MODEL_DIR: ${EMBEDDING_MODEL_DIR:-/data/models}
      # all-MiniLM-L6-v2 → 384; override to 256 only with EMBEDDING_BACKEND=hash
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-384}
      SOURCES_STARTUP_SYNC_ENABLED: ${SOURCES_STARTUP_SYNC_ENABLED:-true}
      SOURCES_STARTUP_SYNC_DELAY_SECONDS: ${SOURCES_STARTUP_SYNC_DELAY_SECONDS:-3}
      SOURCES_WATCH_ENABLED: ${SOURCES_WATCH_ENABLED:-true}
      SOURCES_WATCH_POLL_SECONDS: ${SOURCES_WATCH_POLL_SECONDS:-2}
      SOURCES_WATCH_DEBOUNCE_SECONDS: ${SOURCES_WATCH_DEBOUNCE_SECONDS:-1.5}
      # Standing seed corpus (repo); nested RO mount — no copy into workspace.
      SEED_SOURCES_ROOT: ${SEED_SOURCES_ROOT:-/workspace/sources/seed/writing}
      HF_HUB_OFFLINE: ${HF_HUB_OFFLINE:-1}
      TRANSFORMERS_OFFLINE: ${TRANSFORMERS_OFFLINE:-1}
      HF_HOME: ${HF_HOME:-/data/models}
      RETRIEVAL_RERANK_ENABLED: ${RETRIEVAL_RERANK_ENABLED:-true}
      RETRIEVAL_RERANK_CROSS_ENCODER: ${RETRIEVAL_RERANK_CROSS_ENCODER:-false}
      STALL_THRESHOLD_SECONDS: ${STALL_THRESHOLD_SECONDS:-120}
      STALL_POLL_INTERVAL_SECONDS: ${STALL_POLL_INTERVAL_SECONDS:-30}
      STALL_AUTO_FAIL: ${STALL_AUTO_FAIL:-false}
      TURN_TOKEN_BUDGET: ${TURN_TOKEN_BUDGET:-0}
      CONTEXT_WINDOW_TOKENS: ${CONTEXT_WINDOW_TOKENS:-128000}
      RUNTIME_RUNNER_ID: ${RUNTIME_RUNNER_ID:-}
    volumes:
      - agent_data:/data
      - ${WORKSPACE_HOST_PATH:-../workspace}:/workspace:rw,z
      # Product standing corpus (git): RO mount under sources/ so search_sources
      # indexes it without copying into the user sandbox (docs/15).
      - ${SEED_SOURCES_HOST_PATH:-../seed/sources/writing}:/workspace/sources/seed/writing:ro,z
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # Use /health/live so first-boot can finish before MODEL_API_KEY / Web provider is set.
      # /health/ready still means "model configured" for ops probes.
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8001/health/live"]
      interval: 10s
      timeout: 5s
      start_period: 120s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: services/api/Dockerfile
    container_name: agent-api
    environment:
      DATABASE_URL: ${DATABASE_URL}
      RUNTIME_URL: http://runtime:8001
      RUNTIME_URL_MAP: ${RUNTIME_URL_MAP:-}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN}
      APP_SECRET_KEY: ${APP_SECRET_KEY}
      CONFIG_ENCRYPTION_KEY: ${CONFIG_ENCRYPTION_KEY:-}
      AUTH_ENABLED: ${AUTH_ENABLED:-false}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
      END_USER_AUTH_ENABLED: ${END_USER_AUTH_ENABLED:-true}
      ADMIN_SESSION_BYPASS: ${ADMIN_SESSION_BYPASS:-true}
      END_USER_COOKIE_SECURE: ${END_USER_COOKIE_SECURE:-false}
      APP_ENV: ${APP_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      WORKER_MODE: ${WORKER_MODE:-inline}
      WORKSPACE_ROOT: ${WORKSPACE_ROOT:-/workspace}
      OPS_TEST_SECRET: ${OPS_TEST_SECRET:-}
      OPS_EVAL_GOLDEN_DIR: /app/eval/golden
      OPS_EVAL_COMPOSE_FILE: /app/deploy/docker-compose.yml
      OPS_EVAL_COMPOSE_PROJECT_DIR: /app
    volumes:
      - ${WORKSPACE_HOST_PATH:-../workspace}:/workspace:rw,z
      - ../eval/golden:/app/eval/golden:ro,z
      - ../deploy:/app/deploy:ro,z
      - ../.env:/app/.env:ro,z
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      runtime:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/health/ready"]
      interval: 10s
      timeout: 5s
      start_period: 45s
      retries: 5

  web:
    build:
      context: ..
      dockerfile: services/web/Dockerfile
    container_name: agent-web
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3

  gateway:
    image: caddy:2-alpine
    container_name: agent-gateway
    ports:
      - "${HOST_PORT:-443}:443"
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    environment:
      PUBLIC_DOMAIN: ${PUBLIC_DOMAIN:-localhost}
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  pg_data:
  agent_data:
  caddy_data:
