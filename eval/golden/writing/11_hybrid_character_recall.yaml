id: writing.11_hybrid_character_recall
scenario_id: writing
phase: 2
description: Hybrid BM25+vector recall finds a named character section in a long source

fixtures:
  workspace:
    - path: sources/亮剑.md
      content: |
        # 亮剑人物

        ## 李云龙
        李云龙是主角，作战勇猛，战役频繁，独立团团长。

        ### 张白鹿（主要配角）
        张白鹿性格独立，与李云龙相识，是剧中的重要配角。

input:
  message: "writing.11 引用资料写张白鹿人物小节"
  client_request_id: "00000000-0000-4000-8000-000000000011"

model_mode: stub

assertions:
  events:
    sequence_contains:
      - tool.started
      - retrieval.completed
      - tool.completed
      - turn.completed
  turn:
    status: completed
  tool:
    name: search_sources
    result_matches: "张白鹿"
    # Standing ANN may miss ops-only fixtures → keyword-fallback; hybrid OK when indexed.
    retrieval:
      - hybrid
      - keyword-fallback
  output:
    matches: "张白鹿"

tags: [writing, rag, hybrid, p2]
