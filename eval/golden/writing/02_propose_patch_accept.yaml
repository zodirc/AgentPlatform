id: writing.02_propose_patch_accept
scenario_id: writing
phase: 1
description: Stub model proposes patch; writing auto-apply writes it (docs/14 · WRITING_PATCH_AUTO_APPLY)

fixtures:
  workspace:
    - path: sections/01.md
      content: |
        旧正文

input:
  message: "把第二节改得更简洁"
  client_request_id: "00000000-0000-4000-8000-000000000002"

model_mode: stub

assertions:
  events:
    sequence_contains:
      - turn.accepted
      - patch.proposed
      - patch.applied
      - turn.completed
    sequence_not_contains:
      - turn.failed
  turn:
    status: completed
  workspace:
    - path: sections/01.md
      matches: "简洁的新正文"

tags: [writing, patch, p1]
